<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Minimal dark flashcard app powered by JSON lessons." />
    <title>Memo Garden</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              body: ['Consolas', 'monospace']
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="app.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="min-h-screen font-body">
    <main class="mx-auto flex min-h-screen max-w-6xl items-center justify-center p-2 sm:p-4 md:p-6">
      <section id="menuView" class="w-full">
        <div id="lessonGrid" class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3"></div>
      </section>

      <section id="lessonView" class="hidden w-full max-w-4xl">
        <div id="cardButton" role="button" tabindex="0" class="mx-auto flex min-h-[72vh] w-full cursor-pointer items-stretch rounded-none border-0 bg-transparent p-0 text-center shadow-none transition hover:scale-[1.005] focus:outline-none sm:rounded-[2rem] sm:border sm:border-white/10 sm:bg-white/5 sm:p-6 sm:shadow-[0_30px_120px_rgba(0,0,0,0.45)]">
          <div class="flex w-full flex-col items-center justify-center gap-6 text-center">
            <span id="cardContent" class="mx-auto w-full max-w-3xl text-balance text-3xl font-medium leading-tight text-white sm:text-5xl"></span>
            <div id="answerPanel" class="hidden w-full">
              <div class="mx-auto flex w-full max-w-[18rem] flex-col gap-5 sm:max-w-none sm:flex-row sm:gap-3">
                <button id="goodButton" type="button" class="flex-1 min-h-[4.75rem] rounded-2xl bg-gradient-to-r from-emerald-400 to-emerald-500 px-5 py-6 text-xl font-semibold text-white transition hover:from-emerald-300 hover:to-emerald-400 sm:min-h-[5.5rem] sm:py-7 sm:text-2xl">
                  <span class="inline-flex items-center justify-center gap-2"><i class="fa-solid fa-check"></i><span>GOOD</span></span>
                </button>
                <button id="badButton" type="button" class="flex-1 min-h-[4.75rem] rounded-2xl bg-gradient-to-r from-amber-400 to-orange-500 px-5 py-6 text-xl font-semibold text-white transition hover:from-amber-300 hover:to-orange-400 sm:min-h-[5.5rem] sm:py-7 sm:text-2xl">
                  <span class="inline-flex items-center justify-center gap-2"><i class="fa-solid fa-xmark"></i><span>BAD</span></span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="summaryView" class="hidden w-full max-w-3xl text-center">
        <div class="space-y-6 rounded-none border-0 bg-transparent p-0 shadow-none sm:rounded-[2rem] sm:border sm:border-emerald-400/10 sm:bg-white/5 sm:p-8 sm:shadow-[0_30px_120px_rgba(0,0,0,0.45)]">
          <div>
            <h1 id="summaryTitle" class="text-3xl font-medium text-white sm:text-4xl"></h1>
            <p id="summaryCopy" class="mt-3 text-sm leading-6 text-white/65"></p>
          </div>
          <div class="grid gap-3 sm:grid-cols-4">
            <div class="rounded-2xl bg-gradient-to-br from-emerald-400/10 to-white/5 p-4 text-left">
              <p class="text-[10px] uppercase tracking-[0.28em] text-white/45">Cards</p>
              <p id="summaryCards" class="mt-2 text-2xl font-semibold text-white"></p>
            </div>
            <div class="rounded-2xl bg-gradient-to-br from-sky-400/10 to-white/5 p-4 text-left">
              <p class="text-[10px] uppercase tracking-[0.28em] text-white/45">Rounds</p>
              <p id="summaryRounds" class="mt-2 text-2xl font-semibold text-white"></p>
            </div>
            <div class="rounded-2xl bg-gradient-to-br from-emerald-400/10 to-white/5 p-4 text-left">
              <p class="text-[10px] uppercase tracking-[0.28em] text-white/45">Good</p>
              <p id="summaryGood" class="mt-2 text-2xl font-semibold text-white"></p>
            </div>
            <div class="rounded-2xl bg-gradient-to-br from-orange-400/10 to-white/5 p-4 text-left">
              <p class="text-[10px] uppercase tracking-[0.28em] text-white/45">Bad</p>
              <p id="summaryBad" class="mt-2 text-2xl font-semibold text-white"></p>
            </div>
          </div>
          <div class="flex justify-center">
            <button id="backButton" type="button" class="rounded-full bg-gradient-to-r from-emerald-300 to-sky-300 px-6 py-3 text-sm font-semibold text-slate-950 transition hover:from-emerald-200 hover:to-sky-200">Back to menu</button>
          </div>
        </div>
      </section>

      <section id="errorView" class="hidden w-full max-w-3xl rounded-[2rem] border border-rose-400/20 bg-rose-950/25 p-8 text-center text-rose-100">
        <h2 class="text-2xl font-semibold">Could not load lessons</h2>
        <p id="errorMessage" class="mt-3 text-sm text-rose-100/70"></p>
      </section>
    </main>
  </body>
</html>
