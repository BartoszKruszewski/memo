<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="description" content="Minimal dark flashcard app powered by JSON lessons." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1a1410" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./favicon.svg" />
    <meta name="github-owner" content="BartoszKruszewski" />
    <meta name="github-repo" content="memo" />
    <title>Memo Garden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script type="module" src="./app.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <audio id="silentUnlock" class="silent-unlock" playsinline webkit-playsinline preload="auto" loop src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQAYACAAZG1EYQAAAAAAAP//AAC4AAABAAEA"></audio>
    <label id="iosHapticSwitch" class="ios-haptic-switch" aria-hidden="true">
      <input type="checkbox" switch />
    </label>
    <div id="feedbackUnlockView" class="feedback-unlock hidden">
      <div class="feedback-unlock-card">
        <h2 class="feedback-unlock-title">Enable sound & haptics</h2>
        <p class="feedback-unlock-copy">Tap below so Memo Garden can play sounds and use iPhone feedback.</p>
        <button id="feedbackUnlockButton" type="button" class="primary-button">Continue</button>
      </div>
    </div>
    <div class="app-bg" aria-hidden="true">
      <div class="app-bg__base"></div>
      <div class="app-bg__pulse"></div>
      <div class="app-bg__wash"></div>
    </div>

    <main class="app-shell">
      <section id="menuView" class="view view-menu">
        <header class="app-header">
          <p class="app-eyebrow">Flashcards</p>
          <h1 class="app-title">Memo Garden</h1>
        </header>
        <div id="lessonGrid" class="lesson-grid"></div>
      </section>

      <section id="lessonView" class="view view-lesson hidden">
        <div class="lesson-top">
          <button id="exitLessonButton" type="button" class="icon-button" aria-label="Back to menu">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <div class="lesson-progress" aria-hidden="true">
            <div id="lessonProgressFill" class="lesson-progress-fill"></div>
          </div>
          <p id="lessonProgressLabel" class="lesson-progress-label">0 / 1</p>
        </div>

        <div id="cardButton" class="flashcard" role="button" tabindex="0" aria-label="Tap to reveal answer">
          <div class="flashcard-inner">
            <div id="cardContent" class="card-content"></div>
          </div>
        </div>

        <div id="answerPanel" class="answer-panel">
          <p id="cardHint" class="answer-hint">Tap to reveal</p>
          <div id="answerButtons" class="answer-buttons hidden">
            <button id="goodButton" type="button" class="answer-btn answer-btn-good" aria-label="Good">
              <i class="fa-solid fa-check" aria-hidden="true"></i>
            </button>
            <button id="badButton" type="button" class="answer-btn answer-btn-bad" aria-label="Bad">
              <i class="fa-solid fa-xmark" aria-hidden="true"></i>
            </button>
          </div>
        </div>
      </section>

      <section id="summaryView" class="view view-summary hidden">
        <div class="summary-card">
          <p class="summary-eyebrow">Lesson complete</p>
          <h2 id="summaryTitle" class="summary-title"></h2>
          <p id="summaryCopy" class="summary-copy"></p>

          <div class="summary-stats">
            <div class="summary-stat">
              <span class="summary-stat-label">Cards</span>
              <strong id="summaryCards" class="summary-stat-value"></strong>
            </div>
            <div class="summary-stat">
              <span class="summary-stat-label">Rounds</span>
              <strong id="summaryRounds" class="summary-stat-value"></strong>
            </div>
            <div class="summary-stat">
              <span class="summary-stat-label">Good</span>
              <strong id="summaryGood" class="summary-stat-value summary-stat-good"></strong>
            </div>
            <div class="summary-stat">
              <span class="summary-stat-label">Bad</span>
              <strong id="summaryBad" class="summary-stat-value summary-stat-bad"></strong>
            </div>
          </div>

          <button id="backButton" type="button" class="primary-button">Back to menu</button>
        </div>
      </section>

      <section id="errorView" class="view view-error hidden">
        <div class="error-card">
          <h2 class="error-title">Could not load lessons</h2>
          <p id="errorMessage" class="error-copy"></p>
        </div>
      </section>
    </main>
  </body>
</html>
